---
name: Build and deploy conda packages optimex

on:
  push:
    branches: [main, develop]
    tags: '*'
    paths-ignore:
      # Don't re-build if we only change README.md Or CHANGES.md
      - '**.md'
jobs:
  conda-pkg-build:
    name: build  
    runs-on: "ubuntu-latest"
    defaults:
      run:
        shell: bash -el {0}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: conda-incubator/setup-miniconda@v3
        with:
          python-version: 3.11
          auto-activate-base: true
      - name: Publish distribution 📦 to conda channels
        if: startsWith(github.ref, 'refs/tags')
        shell: bash -l {0}
        env:
          ANACONDA_TOKEN: ${{ secrets.ANACONDA_TOKEN }}
        run: |
          conda info
          conda install -y -q conda-build anaconda-client
          cd conda
          conda build -c conda-forge -c cmutel -c diepers . --user ${{ secrets.ANACONDA_USER }} --token $ANACONDA_TOKEN
