[project]
site_name = "optimex"
site_description = "Time-Explicit Life Cycle Optimization"
site_author = "Timo Diepers, Jan Tautorus"
site_url = "https://optimex.readthedocs.io/en/latest/"

repo_name = "RWTH-LTT/optimex"
repo_url = "https://github.com/RWTH-LTT/optimex"
edit_uri = "edit/main/docs/"

copyright = "Copyright &copy; 2026 Institute of Technical Thermodynamics, RWTH Aachen University"

nav = [
  { Home = "index.md" },
  { Project = [
    { Changelog = "content/changelog.md" },
    { License = "content/license.md" },
    { Contributing = "content/contributing.md" },
    { "Code of Conduct" = "content/codeofconduct.md" },
  ]},
  { "User Guide" = [
    { "Quick Start" = "content/quickstart.md" },
    { Installation = "content/installation.md" },
    { "Brightway Setup" = "content/brightway_setup.md" },
    { "Foreground Modeling" = "content/foreground_modeling.md" },
    { "Optimization Setup" = "content/optimization_setup.md" },
    { Constraints = "content/constraints.md" },
    { Postprocessing = "content/postprocessing_guide.md" },
  ]},
  { Examples = [
    { Overview = "content/examples/index.md" },
    { "Basic Example" = "content/examples/basic_example.md" },
    { "Methanol & Pig Iron Case Study" = "content/examples/methanol_and_iron.md" },
  ]},
  { Theory = [
    { "Why Time Matters" = "content/theory_why_time_matters.md" },
    { "How It Works" = "content/theory_how_it_works.md" },
    { "Scope and Limits" = "content/theory_scope_and_limits.md" },
  ]},
  { "API Reference" = [
    "api/index.md",
    { "LCA Processor" = "api/lca_processor.md" },
    { Converter = "api/converter.md" },
    { Optimizer = "api/optimizer.md" },
    { Postprocessing = "api/postprocessing.md" },
  ]},
]

extra_javascript = [
  "https://cdnjs.cloudflare.com/ajax/libs/mathjax/3.2.0/es5/tex-mml-chtml.min.js",
]

extra_css = [
  "stylesheets/extra.css",
]

[project.theme]
language = "en"
logo = "_static/favicons/favicon.svg"
favicon = "_static/favicons/favicon.svg"
features = [
  "announce.dismiss",
  "content.action.edit",
  "content.action.view",
  "content.code.copy",
  "content.code.annotate",
  "content.tabs.link",
  "content.tooltips",
  "navigation.footer",
  "navigation.instant",
  "navigation.instant.prefetch",
  "navigation.tabs",
  "navigation.path",
  "navigation.top",
  "navigation.tracking",
  "search.highlight",
  "search.share",
  "search.suggest",
  "toc.follow",
]

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
primary = "indigo"
accent = "indigo"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
primary = "indigo"
accent = "indigo"
toggle.icon = "lucide/moon-star"
toggle.name = "Switch to light mode"

[project.theme.icon]
repo = "fontawesome/brands/github"

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/RWTH-LTT/optimex"
name = "Open this Repo on GitHub"

[[project.extra.social]]
icon = "lucide/rocket"
link = "https://mybinder.org/v2/gh/RWTH-LTT/optimex/main?urlpath=%2Fdoc%2Ftree%2Fnotebooks%2Fbasic_optimex_example.ipynb"
name = "Launch interactive Demo on Binder"

[project.markdown_extensions.abbr]
[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.toc]
permalink = true
[project.markdown_extensions.pymdownx.arithmatex]
generic = true
[project.markdown_extensions.pymdownx.betterem]
smart_enable = "all"
[project.markdown_extensions.pymdownx.caret]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.emoji]
emoji_index = "zensical.extensions.emoji.twemoji"
emoji_generator = "zensical.extensions.emoji.to_svg"
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.keys]
[project.markdown_extensions.pymdownx.mark]
[project.markdown_extensions.pymdownx.smartsymbols]
[project.markdown_extensions.pymdownx.snippets]
[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" },
]
[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true
[project.markdown_extensions.pymdownx.tilde]

[project.plugins.mkdocstrings]
enabled = true
default_handler = "python"

[project.plugins.mkdocstrings.handlers.python]
paths = ["src/optimex"]

[project.plugins.mkdocstrings.handlers.python.options]
docstring_style = "numpy"
docstring_section_style = "table"
show_root_heading = true
show_root_toc_entry = true
show_root_full_path = false
show_object_full_path = false
show_category_heading = true
show_symbol_type_heading = true
show_symbol_type_toc = true
members_order = "source"
group_by_category = true
show_if_no_docstring = false
show_signature = true
show_signature_annotations = true
separate_signature = false
signature_crossrefs = true
merge_init_into_class = true
show_source = true
inherited_members = false
filters = ["!^_", "!^__"]

[project.plugins.tags]
